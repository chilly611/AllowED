            };

            const filteredStudents = students.filter((s) => s.institution === institution);
            const queueStudents = filteredStudents.filter(
                (s) => s.status === "pending_review" || s.status === "amendment_pending"
            );

            return (
                <div className="bg-gray-50 min-h-screen">
                    {/* Header */}
                    <header className="bg-white shadow-sm border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                                    <span className="text-white font-bold text-lg">C</span>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-900">VA Certification Dashboard</h1>
                                    <p className="text-sm text-gray-500">ClawBot v0.1 - SCO Review System</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <label className="text-sm font-medium text-gray-700">
                                    Institution:
                                    <select
                                        value={institution}
                                        onChange={(e) => setInstitution(e.target.value)}
                                        className="ml-2 px-3 py-1 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        <option value="SDSU">SDSU (11910105)</option>
                                        <option value="CSUN">CSUN (11918105)</option>
                                    </select>
                                </label>
                            </div>
                        </div>
                    </header>

                    {/* Stats Bar */}
                    {dashboardStats && (
                        <div className="bg-white border-b border-gray-200">
                            <div className="max-w-7xl mx-auto px-6 py-4">
                                <div className="grid grid-cols-5 gap-4">
                                    <div className="bg-gray-50 p-4 rounded-lg">
                                        <div className="text-3xl font-bold text-gray-900">
                                            {dashboardStats.total_students}
                                        </div>
                                        <p className="text-sm text-gray-600 mt-1">Total Students</p>
                                    </div>
                                    <div className="bg-green-50 p-4 rounded-lg border-l-4 border-green-500">
                                        <div className="text-3xl font-bold text-green-700">
                                            {dashboardStats.certified}
                                        </div>
                                        <p className="text-sm text-green-600 mt-1">Certified</p>
                                    </div>
                                    <div className="bg-yellow-50 p-4 rounded-lg border-l-4 border-yellow-500">
                                        <div className="text-3xl font-bold text-yellow-700">
                                            {dashboardStats.pending_review}
                                        </div>
                                        <p className="text-sm text-yellow-600 mt-1">Pending Review</p>
                                    </div>
                                    <div className="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500">
                                        <div className="text-3xl font-bold text-blue-700">
                                            {dashboardStats.amendment_pending}
                                        </div>
                                        <p className="text-sm text-blue-600 mt-1">Amendments</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-lg">
                                        <div className="text-sm font-mono text-gray-600">
                                            {new Date(dashboardStats.timestamp).toLocaleTimeString()}
                                        </div>
                                        <p className="text-sm text-gray-500 mt-1">Last Updated</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Tabs */}
                    <div className="max-w-7xl mx-auto px-6 mt-6">
                        <div className="border-b border-gray-200 mb-6">
                            <div className="flex gap-8">
                                <button
                                    onClick={() => setActiveTab("queue")}
                                    className={`py-3 px-1 border-b-2 font-medium text-sm ${
                                        activeTab === "queue"
                                            ? "border-blue-600 text-blue-600"
                                            : "border-transparent text-gray-500 hover:text-gray-700"
                                    }`}
                                >
                                    Queue ({queueStudents.length})
                                </button>
                                <button
                                    onClick={() => setActiveTab("students")}
                                    className={`py-3 px-1 border-b-2 font-medium text-sm ${
                                        activeTab === "students"
                                            ? "border-blue-600 text-blue-600"
                                            : "border-transparent text-gray-500 hover:text-gray-700"
                                    }`}
                                >
                                    All Students
                                </button>
                                <button
                                    onClick={() => setActiveTab("amendments")}
                                    className={`py-3 px-1 border-b-2 font-medium text-sm ${
                                        activeTab === "amendments"
                                            ? "border-blue-600 text-blue-600"
                                            : "border-transparent text-gray-500 hover:text-gray-700"
                                    }`}
                                >
                                    Amendments ({amendments.length})
                                </button>
                                <button
                                    onClick={() => setActiveTab("audit")}
                                    className={`py-3 px-1 border-b-2 font-medium text-sm ${
                                        activeTab === "audit"
                                            ? "border-blue-600 text-blue-600"
                                            : "border-transparent text-gray-500 hover:text-gray-700"
                                    }`}
                                >
                                    Audit Log
                                </button>
                            </div>
                        </div>

                        {/* Queue Tab */}
                        {activeTab === "queue" && (
                            <div className="space-y-4 pb-8">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-semibold text-gray-900">
                                        Students Needing Action ({queueStudents.length})
                                    </h2>
                                    {queueStudents.filter(s => !s.sco_queue_count).length > 0 && (
                                        <button
                                            onClick={certifyAll}
                                            className="px-4 py-2 bg-green-600 text-white rounded-md text-sm font-medium hover:bg-green-700"
                                        >
                                            Batch Certify Clean
                                        </button>
                                    )}
                                </div>
                                {queueStudents.length === 0 ? (
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-6 text-center">
                                        <p className="text-blue-700 font-medium">All students certified or amendments approved!</p>
                                    </div>
                                ) : (
                                    queueStudents.map((student) => (
                                        <div
                                            key={student.id}
                                            className="bg-white border border-yellow-300 rounded-lg p-6 hover:shadow-md transition"
                                        >
                                            <div className="flex justify-between items-start gap-4">
                                                <div className="flex-1">
                                                    <h3 className="text-lg font-semibold text-gray-900">{student.name}</h3>
                                                    <p className="text-sm text-gray-600 mt-1">{student.program}</p>
                                                    <div className="flex gap-4 mt-3 text-sm text-gray-600">
                                                        <span>Chapter {student.chapter}</span>
                                                        <span>{student.institution}</span>
                                                        <span>{student.certifiable_units} cert. units</span>
                                                    </div>
                                                    {student.sco_queue_count > 0 && (
                                                        <div className="mt-3 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm font-medium">
                                                            {student.sco_queue_count} course(s) in SCO exception queue
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="flex gap-2 flex-shrink-0">
                                                    <button
                                                        onClick={() => {
                                                            if (USE_API) { fetch(`/api/students/${student.id}`).then(r => r.json()).then(setSelectedStudent); } else { setSelectedStudent(EMBEDDED.student_details[student.id]); }
                                                        }}
                                                        className="px-4 py-2 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700"
                                                    >
                                                        Review
                                                    </button>
                                                    {!student.sco_queue_count && (
                                                        <button
                                                            onClick={() => approveStudent(student.id)}
                                                            className="px-4 py-2 bg-green-600 text-white rounded-md text-sm font-medium hover:bg-green-700"
                                                        >
                                                            Approve
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* All Students Tab */}
                        {activeTab === "students" && (
                            <div className="bg-white rounded-lg shadow overflow-hidden pb-8">
                                <table className="course-table">
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Program</th>
                                            <th>Chapter</th>
                                            <th>Institution</th>
                                            <th>Status</th>
                                            <th>Cert. Units</th>
                                            <th>R / D</th>
                                            <th>Training Time</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredStudents.map((student) => (
                                            <tr key={student.id}>
                                                <td className="font-medium">{student.name}</td>
                                                <td className="text-sm">{student.program}</td>
                                                <td>{student.chapter}</td>
                                                <td>{student.institution}</td>
                                                <td>
                                                    <span className={getStatusBadgeClass(student.status)}>
                                                        {getStatusLabel(student.status)}
                                                    </span>
                                                </td>
                                                <td className="text-right font-mono">{student.certifiable_units.toFixed(1)}</td>
                                                <td className="text-right font-mono">
                                                    {student.residential_units.toFixed(1)} / {student.distance_units.toFixed(1)}
                                                </td>
                                                <td className="text-sm">
                                                    {student.training_time ? student.training_time.replace(/_/g, " ") : "-"}
                                                </td>
                                                <td>
                                                    <button
                                                        onClick={() => {
                                                            if (USE_API) { fetch(`/api/students/${student.id}`).then(r => r.json()).then(setSelectedStudent); } else { setSelectedStudent(EMBEDDED.student_details[student.id]); }
                                                        }}
                                                        className="text-blue-600 hover:text-blue-700 text-sm font-medium"
                                                    >
                                                        Details
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* Amendments Tab */}
                        {activeTab === "amendments" && (
                            <div className="space-y-4 pb-8">
                                {amendments.length === 0 ? (
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-6 text-center">
                                        <p className="text-blue-700 font-medium">No pending amendments</p>
                                    </div>
                                ) : (
                                    amendments.map((amd) => (
                                        <div key={amd.id} className="bg-white border border-blue-300 rounded-lg p-6">
                                            <div className="flex justify-between items-start gap-4">
                                                <div className="flex-1">
                                                    <h3 className="text-lg font-semibold text-gray-900">{amd.student_name}</h3>
                                                    <p className="text-sm text-gray-600 mt-1">{amd.reason}</p>
                                                    <div className="mt-4 grid grid-cols-2 gap-4 text-sm">
                                                        <div>
                                                            <p className="font-medium text-gray-700 mb-2">Before</p>
                                                            <p className="text-gray-600">Units: {amd.delta.original_certifiable_units}</p>
                                                            <p className="text-gray-600">Training: {amd.delta.original_training_time}</p>
                                                        </div>
                                                        <div>
                                                            <p className="font-medium text-gray-700 mb-2">After</p>
                                                            <p className="text-gray-600">Units: {amd.delta.revised_certifiable_units}</p>
                                                            <p className="text-gray-600">Training: {amd.delta.revised_training_time}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                {amd.status === "pending" && (
                                                    <button
                                                        onClick={() => approveAmendment(amd.id)}
                                                        className="px-4 py-2 bg-green-600 text-white rounded-md text-sm font-medium hover:bg-green-700 flex-shrink-0"
                                                    >
                                                        Approve
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* Audit Log Tab */}
                        {activeTab === "audit" && (
                            <div className="space-y-2 pb-8">
                                {auditLog.length === 0 ? (
                                    <p className="text-gray-600">No actions logged</p>
                                ) : (
                                    <div className="bg-white rounded-lg overflow-hidden">
                                        {auditLog.map((log, idx) => (
                                            <div key={idx} className="border-b border-gray-200 p-4 hover:bg-gray-50 last:border-b-0">
                                                <div className="flex justify-between items-start gap-4">
                                                    <div className="flex-1">
                                                        <p className="font-medium text-gray-900 capitalize">{log.action.replace(/_/g, " ")}</p>
                                                        <p className="text-sm text-gray-600 mt-1">
                                                            {log.student_name || log.message || ""}
                                                        </p>
                                                    </div>
                                                    <p className="text-xs text-gray-500 flex-shrink-0 font-mono">
                                                        {new Date(log.timestamp).toLocaleTimeString()}
                                                    </p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Student Detail Modal */}
                    {selectedStudent && (
                        <div className="modal-overlay" onClick={() => setSelectedStudent(null)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <div className="bg-gray-50 border-b border-gray-200 p-6 flex justify-between items-start">
                                    <div>
                                        <h2 className="text-2xl font-bold text-gray-900">{selectedStudent.name}</h2>
                                        <p className="text-sm text-gray-600 mt-1">{selectedStudent.program}</p>
                                    </div>
                                    <button
                                        onClick={() => setSelectedStudent(null)}
                                        className="text-gray-400 hover:text-gray-600 text-2xl font-light"
                                    >
                                        ×
                                    </button>
                                </div>
                                <div className="p-6 space-y-6">
                                    {/* Decision Tree Results */}
                                    <div>
                                        <h3 className="text-lg font-semibold text-gray-900 mb-4">Certification Results</h3>
                                        <div className="bg-gray-50 p-4 rounded-lg grid grid-cols-2 gap-4">
                                            <div>
                                                <p className="text-sm text-gray-600">Certifiable Units</p>
                                                <p className="text-2xl font-bold text-gray-900">
                                                    {selectedStudent.dt_output.total_certifiable_units.toFixed(1)}
                                                </p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-600">Training Time</p>
                                                <p className="text-lg font-bold text-gray-900">
                                                    {selectedStudent.dt_output.training_time ? selectedStudent.dt_output.training_time.replace(/_/g, " ") : "-"}
                                                </p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-600">Residential / Distance</p>
                                                <p className="text-lg font-bold text-gray-900">
                                                    {selectedStudent.dt_output.residential_units.toFixed(1)} / {selectedStudent.dt_output.distance_units.toFixed(1)}
                                                </p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-600">Rate of Pursuit</p>
                                                <p className="text-lg font-bold text-gray-900">
                                                    {(selectedStudent.dt_output.rate_of_pursuit * 100).toFixed(0)}%
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Courses Table */}
                                    <div>
                                        <h3 className="text-lg font-semibold text-gray-900 mb-4">Course Breakdown</h3>
                                        <div className="overflow-x-auto">
                                            <table className="course-table">
                                                <thead>
                                                    <tr>
                                                        <th>Course ID</th>
                                                        <th>Title</th>
                                                        <th>Units</th>
                                                        <th>Certifiable</th>
                                                        <th>Modality</th>
                                                        <th>Exclusion Reason</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {selectedStudent.dt_output.courses.map((course) => (
                                                        <tr key={course.course_id}>
                                                            <td className="font-mono font-medium">{course.course_id}</td>
                                                            <td>{course.title}</td>
                                                            <td className="text-right">{course.units}</td>
                                                            <td className="text-center">
                                                                <span className={course.certifiable ? "checkmark" : "xmark"}>
                                                                    {course.certifiable ? "✓" : "✗"}
                                                                </span>
                                                            </td>
                                                            <td className="text-sm">{course.modality || "-"}</td>
                                                            <td className="text-sm text-red-700">
                                                                {course.exclusion_reason ? course.exclusion_reason : "-"}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* HITL Flags */}
                                    {selectedStudent.hitl_flags.length > 0 && (
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900 mb-4">HITL Flags</h3>
                                            <div className="space-y-2">
                                                {selectedStudent.hitl_flags.map((flag, idx) => (
                                                    <div key={idx} className="bg-yellow-50 border border-yellow-200 rounded p-3">
                                                        <p className="text-sm font-medium text-yellow-800">{flag.description}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* SCO Queue Items */}
                                    {selectedStudent.dt_output.sco_queue_items && selectedStudent.dt_output.sco_queue_items.length > 0 && (
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900 mb-4">SCO Exception Queue</h3>
                                            <div className="space-y-2">
                                                {selectedStudent.dt_output.sco_queue_items.map((item, idx) => (
                                                    <div key={idx} className="bg-red-50 border border-red-200 rounded p-3">
                                                        <p className="text-sm font-medium text-red-800">
                                                            {typeof item === "string" ? item : `${item.course_id}: ${item.exclusion_detail || item.exclusion_reason}`}
                                                        </p>
                                                        {item.flags && item.flags.length > 0 && (
                                                            <p className="text-xs text-red-600 mt-1">{item.flags.join(", ")}</p>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Amendments */}
                                    {selectedStudent.amendments && selectedStudent.amendments.length > 0 && (
                                        <div>
                                            <h3 className="text-lg font-semibold text-gray-900 mb-4">Pending Amendments</h3>
                                            <div className="space-y-2">
                                                {selectedStudent.amendments.map((amd) => (
                                                    <div key={amd.id} className="bg-blue-50 border border-blue-200 rounded p-3">
                                                        <p className="text-sm font-medium text-blue-800">{amd.reason}</p>
                                                        <p className="text-xs text-blue-600 mt-1">
                                                            Status: {amd.status}
                                                        </p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<Dashboard />, document.getElementById("root"));
    </script>
</body>
</html>
